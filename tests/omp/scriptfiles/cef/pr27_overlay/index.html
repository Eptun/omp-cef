<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>PR27 Overlay2D Test</title>
    <style>
        html,
        body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: rgba(0, 0, 0, 0);
            font-family: Arial, sans-serif;
        }

        #panel {
            position: absolute;
            left: 24px;
            top: 24px;
            width: 420px;
            padding: 16px;
            color: white;
            background: rgba(0, 0, 0, 0.72);
            border: 2px solid rgba(255, 255, 255, 0.6);
            border-radius: 10px;
            box-sizing: border-box;
        }

        #title {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        #stats {
            font-size: 16px;
            line-height: 1.5;
        }

        #box {
            position: absolute;
            left: 0;
            top: 220px;
            width: 96px;
            height: 96px;
            background: #ff2d2d;
            border: 4px solid white;
            box-sizing: border-box;
        }

        #bar {
            position: absolute;
            left: 24px;
            bottom: 24px;
            height: 18px;
            width: 0;
            background: #00ff88;
        }

        #checker {
            position: absolute;
            right: 24px;
            top: 24px;
            width: 220px;
            height: 220px;
            background:
                linear-gradient(45deg, rgba(255,255,255,.25) 25%, transparent 25%),
                linear-gradient(-45deg, rgba(255,255,255,.25) 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, rgba(255,255,255,.25) 75%),
                linear-gradient(-45deg, transparent 75%, rgba(255,255,255,.25) 75%);
            background-size: 32px 32px;
            background-position: 0 0, 0 16px, 16px -16px, -16px 0;
            border: 2px solid rgba(255,255,255,.6);
        }
    </style>
</head>
<body>
    <div id="panel">
        <div id="title">PR #27 Overlay2D Test</div>
        <div id="stats">
            FPS: <span id="fps">0</span><br>
            Frame: <span id="frame">0</span><br>
            Time: <span id="time">0</span><br>
            Visibility: <span id="visibility">visible</span>
        </div>
    </div>

    <div id="checker"></div>
    <div id="box"></div>
    <div id="bar"></div>

    <script>
        const fpsEl = document.getElementById('fps');
        const frameEl = document.getElementById('frame');
        const timeEl = document.getElementById('time');
        const visibilityEl = document.getElementById('visibility');
        const box = document.getElementById('box');
        const bar = document.getElementById('bar');

        let x = 0;
        let dir = 1;
        let frame = 0;
        let fpsFrames = 0;
        let lastFpsTime = performance.now();
        let start = performance.now();

        document.addEventListener('visibilitychange', () => {
            visibilityEl.textContent = document.hidden ? 'hidden' : 'visible';
        });

        function tick(now) {
            frame++;
            fpsFrames++;

            const elapsed = now - start;
            const maxX = Math.max(1, window.innerWidth - 120);

            x += dir * 8;

            if (x >= maxX) {
                x = maxX;
                dir = -1;
            } else if (x <= 0) {
                x = 0;
                dir = 1;
            }

            box.style.left = x + 'px';
            box.style.background = frame % 120 < 60 ? '#ff2d2d' : '#2d8cff';

            const progress = (elapsed % 5000) / 5000;
            bar.style.width = Math.floor(progress * 500) + 'px';

            frameEl.textContent = frame;
            timeEl.textContent = Math.floor(elapsed).toString();

            if (now - lastFpsTime >= 1000) {
                fpsEl.textContent = fpsFrames.toString();
                fpsFrames = 0;
                lastFpsTime = now;
            }

            requestAnimationFrame(tick);
        }

        requestAnimationFrame(tick);
    </script>
</body>
</html>
